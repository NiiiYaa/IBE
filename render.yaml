databases:
  - name: ibe-postgres
    databaseName: ibe_db
    user: ibe_user
    plan: free

services:
  - type: web
    name: ibe-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ibe-postgres
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: API_HOST
        value: 0.0.0.0
      - key: JWT_SECRET
        generateValue: true
      - key: WEB_BASE_URL
        value: https://hyperguest.net
      - key: CORS_ORIGINS
        value: https://hyperguest.net,https://ibe-web.onrender.com
      - key: HYPERGUEST_SEARCH_DOMAIN
        value: search-api.hyperguest.io
      - key: HYPERGUEST_BOOKING_DOMAIN
        value: book-api.hyperguest.io
      - key: HYPERGUEST_STATIC_DOMAIN
        value: hg-static.hyperguest.com
      # Set these manually in the Render dashboard:
      # HYPERGUEST_BEARER_TOKEN
      # STRIPE_SECRET_KEY
      # STRIPE_WEBHOOK_SECRET

  - type: web
    name: ibe-web
    runtime: docker
    dockerfilePath: ./apps/web/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      # Set these manually in the Render dashboard:
      # NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
