<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Availability</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #111;
      background: #fff;
      padding: 12px;
    }

    #app { display: flex; flex-direction: column; gap: 10px; }

    .status {
      color: #888;
      font-size: 13px;
      text-align: center;
      padding: 24px 0;
    }

    .card {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      overflow: hidden;
      transition: box-shadow .15s;
    }
    .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.08); }

    .card-body {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .room-name {
      font-size: 15px;
      font-weight: 600;
      color: #111;
    }

    .room-meta {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }

    .rates { display: flex; flex-direction: column; gap: 4px; }

    .rate-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #374151;
    }
    .rate-name { color: #6b7280; }
    .rate-amount { font-weight: 600; color: #111; }

    .card-footer {
      border-top: 1px solid #f3f4f6;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .lowest-price {
      font-size: 13px;
      color: #6b7280;
    }
    .lowest-price strong {
      font-size: 16px;
      font-weight: 700;
      color: #111;
    }

    .book-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #2563eb;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      border-radius: 999px;
      text-decoration: none;
      transition: background .15s;
      white-space: nowrap;
    }
    .book-btn:hover { background: #1d4ed8; }

    .avail-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 500;
      color: #15803d;
      background: #dcfce7;
      border-radius: 999px;
      padding: 2px 8px;
    }
    .avail-badge.low {
      color: #b45309;
      background: #fef3c7;
    }
  </style>
</head>
<body>
  <div id="app"><p class="status">Loading availability…</p></div>

  <script>
    let toolInput = null

    window.addEventListener('message', (event) => {
      const msg = event.data
      if (!msg || msg.jsonrpc !== '2.0') return

      if (msg.method === 'ui/initialize') {
        reply(event, msg.id, {})
        return
      }

      if (msg.method === 'ui/notifications/tool-input') {
        toolInput = msg.params?.input ?? {}
        return
      }

      if (msg.method === 'ui/notifications/tool-result') {
        const result = msg.params?.result ?? {}
        const meta   = result._meta ?? {}
        const rooms  = meta.rooms ?? result.structuredContent?.rooms ?? []
        render(rooms, meta)
      }
    })

    function reply(event, id, result) {
      const target = event.source ?? window.parent
      const origin = event.origin && event.origin !== 'null' ? event.origin : '*'
      target.postMessage({ jsonrpc: '2.0', id, result }, origin)
    }

    function fmt(amount, currency) {
      try {
        return new Intl.NumberFormat('en-US', {
          style: 'currency', currency,
          minimumFractionDigits: 0, maximumFractionDigits: 0,
        }).format(amount)
      } catch {
        return `${currency} ${Math.round(amount)}`
      }
    }

    function bookingUrl(room, rate, meta) {
      if (!meta.webBaseUrl || !meta.propertyId) return null
      const p = new URLSearchParams({
        hotelId:           String(meta.propertyId),
        checkIn:           meta.checkIn  ?? '',
        checkOut:          meta.checkOut ?? '',
        'rooms[0][adults]': String(meta.adults ?? 2),
        roomId:            String(room.roomId),
        ratePlanId:        String(rate.ratePlanId),
        searchId:          meta.searchId ?? '',
      })
      return `${meta.webBaseUrl}/search?${p}`
    }

    function render(rooms, meta) {
      const app = document.getElementById('app')
      if (!rooms.length) {
        app.innerHTML = '<p class="status">No rooms available for your selection.</p>'
        return
      }

      const currency = meta.currency ?? 'USD'

      app.innerHTML = rooms.map(room => {
        const bestRate = room.rates?.[0]
        const url = bestRate ? bookingUrl(room, bestRate, meta) : null
        const low = room.availableCount <= 3
        const availLabel = low
          ? `Only ${room.availableCount} left`
          : `${room.availableCount} available`

        const ratesHtml = (room.rates ?? []).slice(0, 3).map(r => `
          <div class="rate-row">
            <span class="rate-name">${r.ratePlanName}${r.boardType ? ' · ' + r.boardType : ''}</span>
            <span class="rate-amount">${fmt(r.amount, currency)}</span>
          </div>
        `).join('')

        return `
          <div class="card">
            <div class="card-body">
              <div>
                <p class="room-name">${room.roomName}</p>
                <p class="room-meta">
                  <span class="avail-badge${low ? ' low' : ''}">${availLabel}</span>
                </p>
              </div>
              <div class="rates">${ratesHtml}</div>
            </div>
            <div class="card-footer">
              <div class="lowest-price">From <strong>${fmt(room.lowestRate, currency)}</strong><br><span style="font-size:11px">per night</span></div>
              ${url
                ? `<a href="${url}" target="_blank" rel="noopener noreferrer" class="book-btn">Book now</a>`
                : `<span style="font-size:12px;color:#6b7280">Contact hotel</span>`
              }
            </div>
          </div>
        `
      }).join('')
    }
  </script>
</body>
</html>
